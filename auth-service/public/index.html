<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Profile</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="main">
        <h1 class="page-title">Auth Profile</h1>
        <p class="page-subtitle">Minimal black and white login screen.</p>
        <div id="input-container">
            <input type="text" id="input-login" class="input-auth" placeholder="login">
            <input type="password" id="input-pass" class="input-auth" placeholder="password">
        </div>
        
        <div id="btn-container">
            <button onclick="login()" class="btn-success">Sign In</button>
            <button onclick="register()" class="btn-secondary">Sign Up</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
